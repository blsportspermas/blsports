<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BL SHOES STOCK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007aff;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body { 
            font-family: 'Noto Sans TC', -apple-system, sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 10px;
            margin: 0;
            color: white;
        }

        #currentTitle {
            margin: 0 0 25px 0;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            font-weight: 700;
        }

        /* 按鈕群組 */
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            max-width: 450px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2); /* 半透明 */
            color: white;
            backdrop-filter: blur(5px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        button.active {
            background-color: white;
            color: var(--primary-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* 視窗容器：磨砂玻璃效果 */
        .window-frame {
            width: 95vw;
            max-width: 420px;
            height: 70vh; 
            overflow: hidden;
            border-radius: 24px;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            border: 8px solid rgba(255,255,255,0.1);
        }

        iframe {
            position: absolute;
            top: 0px; 
            left: 0px;
            width: 900px; /* 根據 N 欄寬度調整 */
            height: 1500px;
            border: none;
        }

        /* 底部裝飾 */
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h2 id="currentTitle">📊 Reading data...</h2>

    <div class="button-group">
        <button onclick="updateSheet('0', 'G1:N16', this)" class="active">YONEX COURT FLOW</button>
        <button onclick="updateSheet('710233596', 'G1:M19', this)">MAXX MACX</button>
        <button onclick="updateSheet('1725871665', 'G1:L18', this)">YONEX STRIDER FLOW</button>
    </div>

    <div class="window-frame">
        <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTHvF02XnDXMvH-sh32vd7c0MjrUJLBxu_rzdj7ckdoOEQerxEoWTriOCqSzFagvxEseBDVNC1ueFJs/pubhtml?gid=0&range=G1:N16&widget=false&headers=false&chrome=false"></iframe>
    </div>

    <div class="footer">Source: Google Sheets (automatic sync updates)</div>

    <script>
        // 初始化標題
        window.onload = function() {
            const activeBtn = document.querySelector('button.active');
            document.getElementById('currentTitle').innerText = activeBtn.innerText;
        };

        function updateSheet(gid, range, btn) {
            const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHvF02XnDXMvH-sh32vd7c0MjrUJLBxu_rzdj7ckdoOEQerxEoWTriOCqSzFagvxEseBDVNC1ueFJs/pubhtml";
            const newUrl = `${baseUrl}?gid=${gid}&range=${range}&widget=false&headers=false&chrome=false`;
            
            document.getElementById('sheetFrame').src = newUrl;
            document.getElementById('currentTitle').innerText = btn.innerText;

            const buttons = document.querySelectorAll('button');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
